services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mezzi
      POSTGRES_PASSWORD: mezzi_password
      POSTGRES_DB: mezzi_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mezzi -d mezzi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3005}:${PORT:-3005}"
    environment:
      PORT: "${PORT:-3005}"
      DATABASE_URL: "postgresql://mezzi:mezzi_password@db:5432/mezzi_db?schema=public"
      NEXTAUTH_URL: "http://localhost:3005"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-dev-secret-change-in-production}"
      AUTH_TRUST_HOST: "true"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
